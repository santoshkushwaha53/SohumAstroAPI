# Render Blueprint — SohumAstroAPI
# Deploy at: https://dashboard.render.com/blueprints
# Docs: https://render.com/docs/blueprint-spec

services:

  # ── Web Service ──────────────────────────────────────────────────────────────
  - type: web
    name: sohum-astro-api
    env: node
    region: singapore   # closest to India; change to oregon/frankfurt if preferred
    plan: starter       # $7/mo — free plan sleeps after 15 min inactivity
    branch: main

    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: sh scripts/start.sh

    healthCheckPath: /api/v1/health
    autoDeploy: true    # auto-deploy on every push to main

    envVars:
      - key: NODE_ENV
        value: production

      # Render injects PORT automatically — app reads it via config
      - key: PORT
        value: 10000

      - key: API_PREFIX
        value: /api/v1

      # Linked to Render PostgreSQL below
      - key: DATABASE_URL
        fromDatabase:
          name: sohum-astro-db
          property: connectionString

      # Linked to Render Redis below
      - key: REDIS_URL
        fromService:
          name: sohum-astro-redis
          type: redis
          property: connectionString

      # Auto-generated secure secrets
      - key: JWT_SECRET
        generateValue: true

      - key: MASTER_API_KEY
        generateValue: true    # grab this from Render dashboard after deploy

      - key: API_KEY_HEADER
        value: x-api-key

      - key: EPHE_PATH
        value: ""              # use Moshier built-in (no data files needed)

      - key: RATE_LIMIT_WINDOW_MS
        value: 60000

      - key: RATE_LIMIT_MAX
        value: 200

      - key: BULL_CONCURRENCY
        value: 3

      - key: CORS_ORIGIN
        value: "*"

      - key: LOG_LEVEL
        value: info

  # ── Redis ────────────────────────────────────────────────────────────────────
  - type: redis
    name: sohum-astro-redis
    region: singapore
    plan: starter       # $10/mo; use free for dev (limited to 25MB)
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []     # only allow internal Render network

# ── PostgreSQL ───────────────────────────────────────────────────────────────
databases:
  - name: sohum-astro-db
    region: singapore
    plan: starter       # $7/mo; use free for dev (90-day expiry on free)
    databaseName: sohum_astro
    user: sohum_astro
